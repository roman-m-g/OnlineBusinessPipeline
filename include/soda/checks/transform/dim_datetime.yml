dataset: online_business/online_business/dim_datetime

columns:
  - name: datetime_id
    data_type: string
    not_null: true
    unique: true
  - name: datetime
    data_type: timestamp
    not_null: false
  - name: year
    data_type: integer
    not_null: false
  - name: month
    data_type: integer
    not_null: false
  - name: day
    data_type: integer
    not_null: false
  - name: hour
    data_type: integer
    not_null: false
  - name: minute
    data_type: integer
    not_null: false
  - name: weekday
    data_type: integer
    not_null: false

checks:
  - row_count:
  - failed_rows:
      name: Weekday in valid range 1-7
      query: |
        SELECT datetime_id, weekday
        FROM online_business.dim_datetime
        WHERE weekday < 1 OR weekday > 7
