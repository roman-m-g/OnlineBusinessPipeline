dataset: online_business/online_business/fct_invoices

columns:
  - name: invoice_id
    data_type: string
    not_null: true
  - name: datetime_id
    data_type: string
    not_null: false
  - name: product_id
    data_type: string
    not_null: false
  - name: customer_id
    data_type: string
    not_null: false
  - name: quantity
    data_type: integer
    not_null: false
  - name: total_invoice_gbp
    data_type: float64
    not_null: false
  - name: total_invoice_usd
    data_type: float64
    not_null: false
  - name: total_invoice_eur
    data_type: float64
    not_null: false

checks:
  - row_count:
  - failed_rows:
      name: No negative invoice totals
      query: |
        SELECT invoice_id, total_invoice_gbp
        FROM online_business.fct_invoices
        WHERE total_invoice_gbp < 0
