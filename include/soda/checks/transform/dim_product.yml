dataset: online_business/online_business/dim_product

columns:
  - name: product_id
    data_type: string
    not_null: true
    unique: true
  - name: stock_code
    data_type: string
    not_null: false
  - name: description
    data_type: string
    not_null: false
  - name: price
    data_type: float64
    not_null: false

checks:
  - row_count:
  - failed_rows:
      name: No negative or zero product prices
      query: |
        SELECT product_id, price
        FROM online_business.dim_product
        WHERE price <= 0
