dataset: online_business/online_business/dim_currency_rates

columns:
  - name: year_month
    data_type: string
    not_null: true
    unique: true
  - name: avg_rate_gpb_usd
    data_type: float64
    not_null: true
  - name: avg_rate_gpb_eur
    data_type: float64
    not_null: true

checks:
  - row_count:
  - failed_rows:
      name: No zero or negative exchange rates
      query: |
        SELECT year_month, avg_rate_gpb_usd, avg_rate_gpb_eur
        FROM online_business.dim_currency_rates
        WHERE avg_rate_gpb_usd <= 0 OR avg_rate_gpb_eur <= 0
