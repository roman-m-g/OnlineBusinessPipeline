dataset: online_business/online_business/report_customer_segments

columns:
  - name: customer_id
    data_type: string
    not_null: true
    unique: true
  - name: country
    data_type: string
    not_null: false
  - name: iso
    data_type: string
    not_null: false
  - name: num_orders
    data_type: integer
    not_null: false
  - name: total_quantity
    data_type: integer
    not_null: false
  - name: total_revenue_gbp
    data_type: float64
    not_null: false
  - name: total_revenue_usd
    data_type: float64
    not_null: false
  - name: total_revenue_eur
    data_type: float64
    not_null: false
  - name: avg_order_value_gbp
    data_type: float64
    not_null: false

checks:
  - row_count:
  - failed_rows:
      name: No negative average order values
      query: |
        SELECT customer_id, avg_order_value_gbp
        FROM online_business.report_customer_segments
        WHERE avg_order_value_gbp < 0
