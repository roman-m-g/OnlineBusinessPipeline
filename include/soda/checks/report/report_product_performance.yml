dataset: online_business/online_business/report_product_performance

columns:
  - name: stock_code
    data_type: string
    not_null: true
  - name: description
    data_type: string
    not_null: false
  - name: total_quantity_sold
    data_type: integer
    not_null: false
  - name: num_invoices
    data_type: integer
    not_null: false
  - name: total_revenue_gbp
    data_type: float64
    not_null: false
  - name: total_revenue_usd
    data_type: float64
    not_null: false
  - name: total_revenue_eur
    data_type: float64
    not_null: false

checks:
  - row_count:
  - failed_rows:
      name: No negative revenue
      query: |
        SELECT stock_code, total_revenue_gbp
        FROM online_business.report_product_performance
        WHERE total_revenue_gbp < 0
